<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AtomOS Home Background</title>
    <style>
      /* Dark opaque base. Matches the React component's outer container
         (`bg-[#0a0a0a]`) so before WebGL has uploaded the first frame —
         and as the persistent fallback if WebGL fails to initialize on a
         given device — the home-bg surface is still an opaque solid color
         instead of a transparent rect that would let other compositor
         layers bleed through under the chat UI. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        overflow: hidden;
      }
      .stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #0a0a0a;
        overflow: hidden;
      }
      /* The shader paints into this canvas; CSS sizes it to fill the
         stage and the JS handles devicePixelRatio. */
      #event-horizon {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <!-- atomos-home-bg placeholder: WebGL event-horizon shader on dark base. -->
  <body>
    <div class="stage" aria-hidden="true">
      <canvas id="event-horizon" aria-hidden="true"></canvas>
    </div>
    <script src="event-horizon.js"></script>
  </body>
</html>
