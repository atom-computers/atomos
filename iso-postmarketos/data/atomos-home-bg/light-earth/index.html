<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AtomOS Light Earth Background</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
      .h-screen { height: 100vh; }
      .w-screen { width: 100vw; }
      .bg-white { background-color: #ffffff; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .globe-offset {
        transform: translateY(-20%) translateX(16.666667%) scale(1.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.js"></script>
  </body>
</html>
